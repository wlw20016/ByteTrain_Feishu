syntax = "proto3";

package bytetrain.feed;

import "proto/paging.proto";

enum ConversationType {
  CONVERSATION_TYPE_UNSPECIFIED = 0;
  CONVERSATION_TYPE_SINGLE = 1;
  CONVERSATION_TYPE_GROUP = 2;
  CONVERSATION_TYPE_BOT = 3;
}

message MessageItem {
  string id = 1;
  string conversation_name = 2;
  ConversationType conversation_type = 3;
  string avatar_url = 4;
  string avatar_text = 5;
  string last_message_preview = 6;
  int64 last_message_time_millis = 7;
  int32 unread_count = 8;
  bool is_pinned = 9;
  bool is_muted = 10;
  bool is_bot = 11;
}

message MessagePageResponse {
  repeated MessageItem items = 1;
  PageInfo page_info = 2;
}

